version: '3.8'

services:
  frontend:
    build: 
      context: ./frontend
    image: blendaniel/daapp
    container_name: frontend
    ports:
      - "3000:3000"
    networks:
      - app-network

  web:
    restart: unless-stopped
    container_name: web
    build: ./web
    image: blendaniel/daweb
    ports:
      - "80:80"
      - "443:443"
    networks:
      - app-network
    depends_on:
      - frontend

networks:
  app-network:
    driver: bridge

volumes:
  appdata: {}
